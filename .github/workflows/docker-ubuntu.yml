name: Docker images (Ubuntu)

# Run this Build for all pushes to 'master' or develop branch, or tagged releases.
# Also run for PRs to ensure PR doesn't break Docker build process
on:
  push:
    branches:
      - jdav-dev
      - jdav-prod
    tags:
      - 'v**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  docker:
    # Ensure this job never runs on forked repos. It's only executed for 'limestech/material-manager'
    if: github.repository == 'limestech/material-manager'
    runs-on: ubuntu-latest
    env:
      IMAGE_TAGS: |
        type=raw,value=latest,enable=${{ endsWith(github.ref, github.event.repository.default_branch) }}
        type=ref,event=branch,enable=${{ !endsWith(github.ref, github.event.repository.default_branch) }}
        type=ref,event=tag
        type=semver,pattern=v{{major}}-latest
      TAGS_FLAVOR: |
        latest=false
      
      # Define the GitHub Packages registry URL
      REGISTRY_URL: ghcr.io
      REPOSITORY: ${{ github.repository }}

    steps:
      # https://github.com/actions/checkout
      - name: Checkout codebase
        uses: actions/checkout@v6

      # https://github.com/docker/setup-buildx-action
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      # https://github.com/docker/login-action
        name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN}}

      ###############################################
      # Build/Push the 'limestech/material-manager' image
      ###############################################
      # https://github.com/docker/metadata-action
      # Get Metadata for docker_build step below
      - name: Sync metadata (tags, labels) from GitHub to Docker for 'material-manager' image
        id: meta_build
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_URL }}/${{ env.REPOSITORY }}
          tags: ${{ env.IMAGE_TAGS }}
          flavor: ${{ env.TAGS_FLAVOR }}

      # https://github.com/docker/build-push-action
      - name: Build and push 'material-manager' image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_build.outputs.tags }}
          labels: ${{ steps.meta_build.outputs.labels }}
